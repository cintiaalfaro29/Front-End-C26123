<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Changa+One&family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Olivia Paper - contacto</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <a href="../index.html"
          ><img src="../img/logo.png" alt="logo de la tienda"
        /></a>
      </div>
      <nav class="nav">
        <ul>
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../pages/contact.html">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="title-pages">Contáctanos</h1>
      <h2 class="title-pages-sub">
        Completa el formulario para ponerte en contacto con nosotros
      </h2>

      <form
        class="form-contact"
        action="https://formspree.io/f/mgodznwg"
        method="POST"
      >
        <div class="group-input">
          <label for="email">Tu email:</label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="group-input">
          <label for="message">Tu mensaje:</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button class="btn" type="submit">Enviar</button>
      </form>
    </main>

    <footer>
      <p>Sitio web Olivia Paper</p>
      <nav class="nav">
        <ul>
          <li><img src="../img/facebook.png" alt="icon-logo-facebook" /></li>
          <li><img src="../img/instagram.png" alt="icon-logo-instagram" /></li>
          <li><img src="../img/whatsapp.png" alt="icon-logo-whatsapp" /></li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
